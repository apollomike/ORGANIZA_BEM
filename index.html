<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORGANIZA BEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8257e5;
            --primary-hover: #9466ff;
            --bg: #09090a;
            --surface: #121214;
            --text: #e1e1e6;
            --text-sub: #a8a8b3;
            --input-bg: #202024;
            --success: #04d361;
            --danger: #f75a68;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #29292e;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #8257e5, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Formulário */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-sub);
        }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(130, 87, 229, 0.3);
        }

        /* Grid Financeiro */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 32px 0;
        }

        .card {
            background: #202024;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #29292e;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card strong {
            font-size: 1.4rem;
            color: var(--primary);
        }

        .card.highlight strong {
            color: var(--success);
        }

        /* Botão */
        .btn-finish {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-finish:hover {
            filter: brightness(1.1);
        }

        .btn-finish:active {
            transform: scale(0.98);
        }

        /* Notificação de Salvo */
        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--success);
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>ORGANIZA BEM</h2>
        <p style="color: var(--text-sub)">Site para a gente não se perder no futuro.</p>
    </header>

    <div class="input-group">
        <label>Data do Evento</label>
        <input type="date" id="dataEvento">
    </div>

    <div class="input-group">
        <label>Descrição do Show</label>
        <textarea id="descricao" rows="3" placeholder="Ex: Show Acústico no Bar Central - 2 sets de 45min"></textarea>
    </div>

    <div class="input-group">
        <label>Valor de Remuneração Total (R$)</label>
        <input type="number" id="valorTotal" placeholder="Ex: 2500" oninput="calcularFinanceiro()">
    </div>

    <div class="dashboard">
        <div class="card">
            <span>Investimento (30%)</span>
            <strong id="resInvestimento">R$ 0,00</strong>
        </div>
        <div class="card">
            <span>Banda (50%)</span>
            <strong id="resBanda">R$ 0,00</strong>
        </div>
        <div class="card highlight">
            <span>Lucro Sobra</span>
            <strong id="resSobra">R$ 0,00</strong>
        </div>
    </div>

    <button class="btn-finish" onclick="salvarEGerarExcel()">
        <span>💾</span> Finalizar e Exportar Excel
    </button>
    
    <p id="status">Evento salvo com sucesso!</p>
</div>

<script>
    let eventosSalvos = JSON.parse(localStorage.getItem('meusEventos')) || [];

    function calcularFinanceiro() {
        const total = parseFloat(document.getElementById('valorTotal').value) || 0;
        
        // Lógica de distribuição (ajuste as porcentagens aqui)
        const invest = total * 0.30;
        const banda = total * 0.50;
        const sobra = total - (invest + banda);

        // Formatação para Real Brasileiro
        const formatar = (v) => v.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});

        document.getElementById('resInvestimento').innerText = formatar(invest);
        document.getElementById('resBanda').innerText = formatar(banda);
        document.getElementById('resSobra').innerText = formatar(sobra);
    }

    function salvarEGerarExcel() {
        const total = document.getElementById('valorTotal').value;
        const data = document.getElementById('dataEvento').value;

        if (!total || !data) {
            alert("Por favor, preencha pelo menos a data e o valor.");
            return;
        }

        const evento = {
            Data: data,
            Descricao: document.getElementById('descricao').value,
            Valor_Total: parseFloat(total),
            Investimento_Evento: parseFloat(total * 0.30),
            Pagamento_Banda: parseFloat(total * 0.50),
            Sobra_Lucro: parseFloat(total * 0.20)
        };

        eventosSalvos.push(evento);
        localStorage.setItem('meusEventos', JSON.stringify(eventosSalvos));

        // Gerar o Excel com todos os eventos acumulados
        const worksheet = XLSX.utils.json_to_sheet(eventosSalvos);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Historico de Shows");
        
        XLSX.writeFile(workbook, "gestao_de_shows.xlsx");
        
        // Feedback visual
        const status = document.getElementById('status');
        status.style.opacity = '1';
        setTimeout(() => status.style.opacity = '0', 3000);
    }
</script>

</body>
</html>
